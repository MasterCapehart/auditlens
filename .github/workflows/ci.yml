name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── Python tests ─────────────────────────────────────────────────────────────
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install auditlens and dev dependencies
        # T3-8 FIX: setup.py is at the repo root, not in auditlens_cli/
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=auditlens --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          files: coverage.xml
          flags: unittests
          name: auditlens-coverage

  # ── Lint & type check ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check auditlens/ --select=E,F,W --ignore=E501

  # ── Self-scan with AuditLens ─────────────────────────────────────────────────
  self-scan:
    name: AuditLens Self-Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AuditLens
        run: pip install -e "."

      - name: Run AuditLens on itself
        run: |
          auditlens scan auditlens/ --format sarif --output auditlens-self-scan.sarif \
            --severity HIGH --no-sca --no-history || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: auditlens-self-scan.sarif
          category: auditlens-self
        continue-on-error: true

  # ── VS Code Extension build ──────────────────────────────────────────────────
  vscode-extension:
    name: VS Code Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci --ignore-scripts

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile
