rules:

  # ── Hardcoded Secrets ────────────────────────────────────────────────────────
  - id: "SEC-01-HARDCODED-SECRET"
    name: "Hardcoded Secret (Passwords, Tokens, Keys)"
    description: >
      Detects plaintext secrets hardcoded directly in source code (passwords,
      API keys, tokens). Use environment variables or a secrets manager instead.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?i)(password|passwd|pwd|secret|token|api_key|apikey|auth_key|private_key|access_key|client_secret)\\s*(=|:)\\s*[\"'][^\"']{3,}[\"']"
    compliance: ["OWASP-A7:2021", "CWE-798", "ISO-27001:A.9"]
    severity: "HIGH"

  # ── Weak Cryptography ────────────────────────────────────────────────────────
  - id: "SEC-02-MD5-USAGE"
    name: "Weak Hashing Algorithm: MD5"
    description: >
      MD5 is cryptographically broken and unsuitable for password hashing or
      integrity verification. Use SHA-256, SHA-3, or bcrypt/argon2 for passwords.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?i)(?:hashlib\\.)?md5\\s*\\("
    compliance: ["OWASP-A2:2021", "CWE-327", "PCI-DSS 6.3.3"]
    severity: "HIGH"

  - id: "SEC-03-SHA1-USAGE"
    name: "Weak Hashing Algorithm: SHA-1"
    description: >
      SHA-1 is deprecated for cryptographic use. Migrate to SHA-256 or stronger.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?i)(?:hashlib\\.)?sha1\\s*\\("
    compliance: ["OWASP-A2:2021", "CWE-327", "NIST SP 800-131A"]
    severity: "MEDIUM"

  - id: "SEC-04-WEAK-RANDOM"
    name: "Insecure Random Number Generator"
    description: >
      Math.random() / random.random() are not cryptographically secure and must
      not be used for security tokens, passwords, or session IDs.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:math\\.random|random\\.random|random\\.randint)\\s*\\("
    compliance: ["OWASP-A2:2021", "CWE-338"]
    severity: "MEDIUM"

  - id: "SEC-05-INSECURE-TLS"
    name: "TLS Verification Disabled"
    description: >
      Setting verify=False or rejectUnauthorized:false disables TLS certificate
      validation, making connections vulnerable to MITM attacks.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:verify\\s*=\\s*False|rejectUnauthorized\\s*:\\s*false|NODE_TLS_REJECT_UNAUTHORIZED\\s*=\\s*[\"']0[\"'])"
    compliance: ["OWASP-A2:2021", "CWE-295", "PCI-DSS 6.2.4"]
    severity: "CRITICAL"

  # ── Injection ────────────────────────────────────────────────────────────────
  - id: "INJ-01-SQL-INJECTION"
    name: "Potential SQL Injection"
    description: >
      String formatting or concatenation used to build SQL queries. Use
      parameterised queries / prepared statements instead.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:execute|query|raw)\\s*\\(\\s*[\"'f].*(?:SELECT|INSERT|UPDATE|DELETE|WHERE|FROM|JOIN|DROP|UNION)"
    compliance: ["OWASP-A3:2021", "CWE-89", "PCI-DSS 6.3.1"]
    severity: "CRITICAL"

  - id: "INJ-02-COMMAND-INJECTION"
    name: "Potential Command Injection"
    description: >
      Shell commands constructed from user-controlled input. Use subprocess with
      a list of arguments (no shell=True) and validate all inputs.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:os\\.system|subprocess\\.(?:call|run|Popen)|exec|execSync|spawnSync|child_process\\.exec)\\s*\\((?:[^)]*\\+|f[\"'][^)]*\\{)"
    compliance: ["OWASP-A3:2021", "CWE-78"]
    severity: "CRITICAL"

  - id: "INJ-03-XSS-INNER-HTML"
    name: "Potential Cross-Site Scripting (XSS) — innerHTML"
    description: >
      Assigning unsanitised values to innerHTML or document.write() can allow
      script injection. Use textContent or a DOM sanitiser.
    languages: ["javascript", "typescript"]
    regex_pattern: "(?i)(?:innerHTML|outerHTML|document\\.write)\\s*(?:=|\\+=)\\s*(?!\\s*[\"'])"
    compliance: ["OWASP-A3:2021", "CWE-79"]
    severity: "HIGH"

  - id: "INJ-04-EVAL-USAGE"
    name: "Use of eval()"
    description: >
      eval() executes arbitrary code and is a common injection vector.
      Refactor to avoid dynamic code execution.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?<![a-zA-Z_])eval\\s*\\("
    compliance: ["OWASP-A3:2021", "CWE-95"]
    severity: "HIGH"

  - id: "INJ-05-LDAP-INJECTION"
    name: "Potential LDAP Injection"
    description: >
      Unsanitised user input in LDAP filter strings. Escape special characters
      per RFC 4515 before building filter expressions.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:search|bind|modify)\\s*\\(.*(?:\\+|f[\"']).*(?:dc=|cn=|ou=)"
    compliance: ["OWASP-A3:2021", "CWE-90"]
    severity: "HIGH"

  # ── Path Traversal ────────────────────────────────────────────────────────────
  - id: "PT-01-PATH-TRAVERSAL"
    name: "Potential Path Traversal"
    description: >
      File paths constructed from user input without normalisation allow attackers
      to escape the intended directory (../ sequences). Use os.path.realpath and
      validate that the result is within the expected directory.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:open|readFile|readFileSync|send(?:File)?)\\s*\\((?:[^)]*\\+|f[\"'][^)]*\\{|[^)]*request|[^)]*req\\.)"
    compliance: ["OWASP-A1:2021", "CWE-22"]
    severity: "HIGH"

  # ── Insecure Deserialization ──────────────────────────────────────────────────
  - id: "DESER-01-PICKLE"
    name: "Insecure Deserialization: pickle"
    description: >
      pickle.loads() / pickle.load() on untrusted data allows arbitrary code
      execution. Use JSON or a safe format for data exchange.
    languages: ["python"]
    regex_pattern: "(?i)pickle\\.loads?\\s*\\("
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "CRITICAL"

  - id: "DESER-02-YAML-LOAD"
    name: "Insecure YAML Deserialization"
    description: >
      yaml.load() without Loader=yaml.SafeLoader allows execution of arbitrary
      Python objects. Use yaml.safe_load() instead.
    languages: ["python"]
    regex_pattern: "yaml\\.load\\s*\\([^)]*(?!SafeLoader|Loader=yaml\\.SafeLoader)"
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "HIGH"

  # ── SSRF ─────────────────────────────────────────────────────────────────────
  - id: "SSRF-01-USER-URL"
    name: "Potential Server-Side Request Forgery (SSRF)"
    description: >
      HTTP requests made with URLs derived from user input. Validate and allowlist
      target hosts to prevent internal network access.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:requests\\.(?:get|post|put|patch|delete)|fetch|axios\\.(?:get|post))\\s*\\((?:[^)]*\\+|f[\"'][^)]*\\{|[^)]*request|[^)]*req\\.)"
    compliance: ["OWASP-A10:2021", "CWE-918"]
    severity: "HIGH"

  # ── Sensitive Data ────────────────────────────────────────────────────────────
  - id: "COMP-01-SENSITIVE-DATA-RUT"
    name: "Sensitive Data Handling: RUT (Chilean National ID)"
    description: >
      Detects handling of the 'RUT' personal identifier. This data is regulated
      under Ley N° 19.628 (Chile) and GDPR Art. 5. Ensure it is encrypted or
      hashed before storage and never logged in plaintext.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?i)\\brut\\b"
    compliance: ["Ley N° 19.628 (Chile)", "GDPR Art. 5", "CWE-312"]
    severity: "MEDIUM"

  - id: "DATA-01-SENSITIVE-LOGGING"
    name: "Sensitive Data in Log Statement"
    description: >
      Log statements that may include passwords, tokens, or secrets.
      Sanitise or mask sensitive values before logging.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:print|console\\.(?:log|info|warn|error)|logging\\.(?:info|debug|warning|error))\\s*\\([^)]*(?:password|passwd|token|secret|api_key|apikey)"
    compliance: ["OWASP-A9:2021", "CWE-532", "GDPR Art. 5"]
    severity: "HIGH"

  - id: "DATA-02-HARDCODED-IP"
    name: "Hardcoded IP Address"
    description: >
      Hardcoded IP addresses indicate non-configurable infrastructure references
      and may expose internal network topology.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?<![\\w.])(?:[0-9]{1,3}\\.){3}[0-9]{1,3}(?![\\w.])"
    compliance: ["OWASP-A5:2021", "CWE-284"]
    severity: "LOW"

  # ── Security Misconfigurations ────────────────────────────────────────────────
  - id: "CONF-01-DEBUG-ENABLED"
    name: "Debug Mode Enabled"
    description: >
      Running with DEBUG=True / debug=True in production exposes stack traces
      and internal state to end users.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:DEBUG|debug)\\s*=\\s*True"
    compliance: ["OWASP-A5:2021", "CWE-94"]
    severity: "MEDIUM"

  - id: "CONF-02-CORS-WILDCARD"
    name: "CORS Wildcard Origin"
    description: >
      Setting Access-Control-Allow-Origin: * allows any domain to make
      cross-origin requests to your API.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)Access-Control-Allow-Origin[\"']?\\s*[,:]\\s*[\"']?\\*"
    compliance: ["OWASP-A5:2021", "CWE-942"]
    severity: "MEDIUM"

  - id: "CONF-03-HARDCODED-CREDENTIALS-URL"
    name: "Credentials in URL"
    description: >
      URLs containing embedded usernames and passwords expose credentials
      in logs, browser history, and referrer headers.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?i)[a-z][a-z0-9+\\-.]*://[^@/\\s]+:[^@/\\s]+@"
    compliance: ["OWASP-A7:2021", "CWE-312"]
    severity: "HIGH"

  # ── Broken Access Control ────────────────────────────────────────────────────
  - id: "AUTH-01-SHELL-TRUE"
    name: "Subprocess with shell=True"
    description: >
      shell=True expands shell metacharacters in the command string and is
      equivalent to passing input through /bin/sh, enabling command injection.
      Pass arguments as a list and set shell=False.
    languages: ["python"]
    regex_pattern: "subprocess\\.(?:run|call|Popen|check_output)\\s*\\([^)]*shell\\s*=\\s*True"
    compliance: ["OWASP-A1:2021", "CWE-78"]
    severity: "HIGH"

  - id: "AUTH-02-PERMISSIVE-CHMOD"
    name: "Overly Permissive File Permission"
    description: >
      Setting file permissions to 0o777 or 0o666 grants world-read/write access
      and may expose sensitive files.
    languages: ["python"]
    regex_pattern: "os\\.chmod\\s*\\([^,]+,\\s*0o(?:777|666|775|664)"
    compliance: ["OWASP-A1:2021", "CWE-732"]
    severity: "MEDIUM"

  # ── JWT Security ──────────────────────────────────────────────────────────────
  - id: "SEC-06-JWT-VERIFY-FALSE"
    name: "JWT Signature Verification Disabled"
    description: >
      Disabling JWT signature verification (verify_signature=False or options={"verify_exp":False})
      allows attackers to forge arbitrary tokens without a valid secret.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:verify_signature\\s*:\\s*False|verify\\s*=\\s*False|options\\s*=\\s*\\{[^}]*verify)"
    compliance: ["OWASP-A2:2021", "CWE-347"]
    severity: "CRITICAL"

  - id: "SEC-07-JWT-NONE-ALGORITHM"
    name: "JWT 'none' Algorithm"
    description: >
      Using algorithm='none' in JWT signing creates unsigned tokens that any
      verifier accepting 'none' will accept. Always specify RS256 or HS256.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)algorithm\\s*=\\s*[\"']none[\"']"
    compliance: ["OWASP-A2:2021", "CWE-347", "CVE-2015-9235"]
    severity: "CRITICAL"

  # ── Cloud Credentials ─────────────────────────────────────────────────────────
  - id: "SEC-08-AWS-ACCESS-KEY"
    name: "Hardcoded AWS Access Key ID"
    description: >
      AWS access key IDs beginning with AKIA followed by 16 uppercase alphanumeric
      characters detected in source code. Rotate the key immediately and use IAM roles.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "AKIA[0-9A-Z]{16}"
    compliance: ["OWASP-A7:2021", "CWE-798", "AWS Security Best Practices"]
    severity: "CRITICAL"

  - id: "SEC-09-GITHUB-TOKEN"
    name: "Hardcoded GitHub Token"
    description: >
      GitHub personal access tokens (ghp_, gho_, github_pat_) detected in source.
      Revoke the token immediately and use GitHub Secrets or OIDC instead.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "(?:ghp_|gho_|ghu_|ghs_|ghr_|github_pat_)[A-Za-z0-9_]{20,}"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  - id: "SEC-10-SLACK-WEBHOOK"
    name: "Hardcoded Slack Webhook URL"
    description: >
      Slack Incoming Webhook URLs detected in source. Revoke immediately.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "https://hooks\\.slack\\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "HIGH"

  # ── Template Injection ────────────────────────────────────────────────────────
  - id: "INJ-06-TEMPLATE-INJECTION"
    name: "Server-Side Template Injection (SSTI)"
    description: >
      User-controlled strings passed directly to Jinja2 Template() or
      render_template_string() allow arbitrary code execution on the server.
    languages: ["python"]
    regex_pattern: "(?i)(?:jinja2\\.Template|render_template_string)\\s*\\([^)]*(?:request|user_input|data|params|args)"
    compliance: ["OWASP-A3:2021", "CWE-94"]
    severity: "CRITICAL"

  # ── NoSQL Injection ───────────────────────────────────────────────────────────
  - id: "INJ-07-NOSQL-INJECTION"
    name: "Potential NoSQL Injection"
    description: >
      MongoDB $where, $regex, or similar operators built from user input
      allow query injection. Use parameterised queries.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)\\$(?:where|regex|gt|lt|ne|in|nin|exists).*(?:request|user_input|req\\.|params)"
    compliance: ["OWASP-A3:2021", "CWE-943"]
    severity: "HIGH"

  # ── Insecure Deserialization (additional) ─────────────────────────────────────
  - id: "DESER-03-MARSHAL"
    name: "Insecure Deserialization: marshal"
    description: >
      marshal.loads() / marshal.load() executes arbitrary Python code just like
      pickle. Use JSON for untrusted data.
    languages: ["python"]
    regex_pattern: "(?i)marshal\\.loads?\\s*\\("
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "CRITICAL"

  # ── Web Framework Misconfigurations ───────────────────────────────────────────
  - id: "CONF-04-FLASK-DEBUG"
    name: "Flask Debug Mode in Code"
    description: >
      app.run(debug=True) exposes an interactive debugger with code execution
      capabilities to anyone who can reach the server.
    languages: ["python"]
    regex_pattern: "app\\.run\\s*\\([^)]*debug\\s*=\\s*True"
    compliance: ["OWASP-A5:2021", "CWE-94"]
    severity: "CRITICAL"

  - id: "CONF-05-DJANGO-ALLOWED-HOSTS"
    name: "Django ALLOWED_HOSTS Wildcard"
    description: >
      ALLOWED_HOSTS = ['*'] disables Django's Host header validation,
      enabling Host header injection attacks.
    languages: ["python"]
    regex_pattern: "ALLOWED_HOSTS\\s*=\\s*\\[\\s*['\"]\\*['\"]\\s*\\]"
    compliance: ["OWASP-A5:2021", "CWE-693"]
    severity: "HIGH"

  - id: "CONF-06-DJANGO-SECRET-KEY"
    name: "Django SECRET_KEY Hardcoded"
    description: >
      A hardcoded Django SECRET_KEY in settings.py allows session forgery and
      other cryptographic attacks. Use environment variables.
    languages: ["python"]
    regex_pattern: "SECRET_KEY\\s*=\\s*[\"'][^\"']{8,}[\"']"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  # ── Cryptography Misuse ───────────────────────────────────────────────────────
  - id: "CRYPTO-01-DES-USAGE"
    name: "Broken Cipher: DES / 3DES"
    description: >
      DES and 3DES are broken and deprecated. Migrate to AES-256-GCM.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:DES|TripleDES|3DES|Cipher\\.DES)\\s*[.(]"
    compliance: ["OWASP-A2:2021", "CWE-327", "NIST SP 800-131A"]
    severity: "HIGH"

  - id: "CRYPTO-02-AES-ECB"
    name: "AES in ECB Mode"
    description: >
      AES ECB mode does not use an IV and produces deterministic ciphertext,
      leaking data patterns. Use AES-GCM or AES-CBC with a random IV.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:AES\\.MODE_ECB|createCipheriv\\s*\\([^)]*['\"]aes[^'\"]*-ecb)"
    compliance: ["OWASP-A2:2021", "CWE-327"]
    severity: "HIGH"

  - id: "CRYPTO-03-RC4-USAGE"
    name: "Broken Cipher: RC4"
    description: >
      RC4 is cryptographically broken and banned by RFC 7465. Use AES-GCM.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)\\bRC4\\b|Cipher\\.RC4"
    compliance: ["OWASP-A2:2021", "CWE-327", "RFC 7465"]
    severity: "HIGH"

  # ── Unsafe Redirects ─────────────────────────────────────────────────────────
  - id: "AUTH-03-OPEN-REDIRECT"
    name: "Potential Open Redirect"
    description: >
      Redirecting to a URL constructed from user input without validation
      enables phishing attacks via trusted domain redirects.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:redirect|location|window\\.location)\\s*[=(]\\s*(?:request|req\\.|params|args)"
    compliance: ["OWASP-A1:2021", "CWE-601"]
    severity: "MEDIUM"

  # ── Prototype Pollution ───────────────────────────────────────────────────────
  - id: "INJ-08-PROTOTYPE-POLLUTION"
    name: "Potential Prototype Pollution"
    description: >
      Assigning to __proto__ or using Object.assign/merge with user-controlled
      keys can pollute the Object prototype chain.
    languages: ["javascript", "typescript"]
    regex_pattern: "(?i)(?:__proto__|constructor\\s*\\[|Object\\.assign\\s*\\([^)]*(?:req\\.|request|params))"
    compliance: ["OWASP-A3:2021", "CWE-915"]
    severity: "HIGH"

  # ── Logging / Monitoring ──────────────────────────────────────────────────────
  - id: "DATA-03-FULL-REQUEST-LOG"
    name: "Full Request Body Logged"
    description: >
      Logging the entire request body (req.body / request.data) may capture
      passwords, credit card numbers, and other PII in log files.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?i)(?:console\\.log|logging\\.\\w+|print)\\s*\\([^)]*(?:req\\.body|request\\.data|request\\.form)"
    compliance: ["OWASP-A9:2021", "CWE-532", "GDPR Art. 5"]
    severity: "MEDIUM"

  # ── XML / XXE ────────────────────────────────────────────────────────────────
  - id: "INJ-09-XXE"
    name: "XML External Entity (XXE) Injection"
    description: >
      Parsing XML with external entity resolution enabled allows reading
      arbitrary files and SSRF. Use defusedxml or disable external entities.
    languages: ["python"]
    regex_pattern: "(?i)(?:etree\\.parse|minidom\\.parse|SAXParser|XMLParser)\\s*\\("
    compliance: ["OWASP-A5:2021", "CWE-611"]
    severity: "HIGH"

  # ── Regex DoS ────────────────────────────────────────────────────────────────
  - id: "CONF-07-REGEX-DOS"
    name: "Potential Regular Expression Denial of Service (ReDoS)"
    description: >
      Complex or nested quantifiers in regular expressions applied to untrusted
      input can cause catastrophic backtracking.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "re\\.(?:compile|match|search|fullmatch)\\s*\\([^)]*(?:\\(.*\\*|\\+.*\\+|\\{\\d+,\\})"
    compliance: ["OWASP-A6:2021", "CWE-400"]
    severity: "MEDIUM"

  # ── Hardcoded Private Keys / Certificates ────────────────────────────────────
  - id: "SEC-11-PRIVATE-KEY-BLOCK"
    name: "Private Key in Source Code"
    description: >
      PEM-encoded private key block detected in source code.
      Remove immediately and use a secrets manager.
    languages: ["python", "javascript", "typescript", "swift"]
    regex_pattern: "-----BEGIN (?:RSA |EC )?PRIVATE KEY-----"
    compliance: ["OWASP-A7:2021", "CWE-321"]
    severity: "CRITICAL"

  # ── Timing Attacks ────────────────────────────────────────────────────────────
  - id: "AUTH-04-TIMING-ATTACK"
    name: "Unsafe String Comparison for Secrets"
    description: >
      Using == or != to compare secrets, tokens, or passwords is vulnerable
      to timing attacks. Use hmac.compare_digest() or secrets.compare_digest().
    languages: ["python"]
    regex_pattern: "(?i)(?:password|token|secret|api_key)\\s*(?:==|!=)\\s*['\"]"
    compliance: ["OWASP-A2:2021", "CWE-208"]
    severity: "MEDIUM"

  # ══════════════════════════════════════════════════════════════════════════════
  # GO RULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "GO-01-SQL-INJECTION"
    name: "Go: Potential SQL Injection"
    description: >
      String formatting (fmt.Sprintf, string concatenation) used to build SQL
      queries in Go. Use parameterized queries with db.Query("?", args...) instead.
    languages: ["go"]
    regex_pattern: "(?i)(?:db|tx|conn)\\.(?:Query|Exec|QueryRow)\\s*\\(\\s*fmt\\.Sprintf"
    compliance: ["OWASP-A3:2021", "CWE-89"]
    severity: "CRITICAL"

  - id: "GO-02-COMMAND-INJECTION"
    name: "Go: Potential Command Injection"
    description: >
      exec.Command built from user-controlled string concatenation.
      Use a fixed command with argument list; never pass user input to the command name.
    languages: ["go"]
    regex_pattern: "exec\\.Command\\s*\\([^)]*\\+"
    compliance: ["OWASP-A3:2021", "CWE-78"]
    severity: "CRITICAL"

  - id: "GO-03-HARDCODED-SECRET"
    name: "Go: Hardcoded Secret"
    description: >
      Sensitive variable assigned a string literal in Go source.
      Use os.Getenv() or a secrets manager.
    languages: ["go"]
    regex_pattern: "(?i)(?:password|secret|token|api_key|apiKey|privateKey)\\s*(?::=|=)\\s*\"[^\"]{3,}\""
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "HIGH"

  - id: "GO-04-WEAK-RANDOM"
    name: "Go: Insecure math/rand"
    description: >
      math/rand is not cryptographically secure. Use crypto/rand for tokens,
      session IDs, or any security-sensitive random value.
    languages: ["go"]
    regex_pattern: "rand\\.(?:Intn|Int63|Float64|New)\\s*\\("
    compliance: ["OWASP-A2:2021", "CWE-338"]
    severity: "MEDIUM"

  - id: "GO-05-TLS-INSECURE"
    name: "Go: TLS InsecureSkipVerify"
    description: >
      InsecureSkipVerify: true disables TLS certificate validation,
      making connections vulnerable to MITM attacks.
    languages: ["go"]
    regex_pattern: "InsecureSkipVerify\\s*:\\s*true"
    compliance: ["OWASP-A2:2021", "CWE-295"]
    severity: "CRITICAL"

  - id: "GO-06-SSRF"
    name: "Go: Potential SSRF"
    description: >
      http.Get/Post called with a URL derived from user input.
      Validate and allowlist target hosts.
    languages: ["go"]
    regex_pattern: "http\\.(?:Get|Post|Do)\\s*\\([^)]*(?:r\\.URL|r\\.Form|r\\.Query|fmt\\.Sprintf)"
    compliance: ["OWASP-A10:2021", "CWE-918"]
    severity: "HIGH"

  - id: "GO-07-PATH-TRAVERSAL"
    name: "Go: Potential Path Traversal"
    description: >
      os.Open or ioutil.ReadFile called with a path from user input.
      Use filepath.Clean and validate the result stays within expected directory.
    languages: ["go"]
    regex_pattern: "(?:os\\.Open|ioutil\\.ReadFile|os\\.ReadFile)\\s*\\([^)]*(?:r\\.|req\\.|Vars\\(|Query\\()"
    compliance: ["OWASP-A1:2021", "CWE-22"]
    severity: "HIGH"

  - id: "GO-08-HARDCODED-CREDENTIALS-URL"
    name: "Go: Credentials in Connection String"
    description: >
      Database or service connection strings with embedded credentials.
      Use environment variables or a secrets manager.
    languages: ["go"]
    regex_pattern: "(?i)[a-z][a-z0-9+\\-.]*://[^@/\\s]+:[^@/\\s]+@"
    compliance: ["OWASP-A7:2021", "CWE-312"]
    severity: "HIGH"

  - id: "GO-09-MD5-SHA1"
    name: "Go: Weak Hash (MD5/SHA1)"
    description: >
      crypto/md5 and crypto/sha1 are cryptographically weak.
      Use crypto/sha256 or crypto/sha512.
    languages: ["go"]
    regex_pattern: "(?:md5|sha1)\\.New\\s*\\(\\s*\\)"
    compliance: ["OWASP-A2:2021", "CWE-327"]
    severity: "HIGH"

  - id: "GO-10-GOROUTINE-LEAK"
    name: "Go: Potential Goroutine Leak"
    description: >
      go func() without a mechanism to stop it (context, channel, WaitGroup)
      can cause goroutine leaks that exhaust memory under load.
    languages: ["go"]
    regex_pattern: "go\\s+func\\s*\\(\\s*\\)\\s*\\{"
    compliance: ["CWE-400"]
    severity: "LOW"

  # ══════════════════════════════════════════════════════════════════════════════
  # JAVA / KOTLIN RULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "JAVA-01-SQL-INJECTION"
    name: "Java: Potential SQL Injection"
    description: >
      String concatenation used to build SQL queries. Use PreparedStatement
      with parameterized placeholders instead.
    languages: ["java", "kotlin"]
    regex_pattern: "(?i)(?:createStatement|executeQuery|executeUpdate)\\s*\\([^)]*(?:\\+|String\\.format)"
    compliance: ["OWASP-A3:2021", "CWE-89"]
    severity: "CRITICAL"

  - id: "JAVA-02-COMMAND-INJECTION"
    name: "Java: Potential Command Injection"
    description: >
      Runtime.exec() or ProcessBuilder called with user-controlled input.
      Use a fixed command array; never concatenate user input into command strings.
    languages: ["java", "kotlin"]
    regex_pattern: "(?:Runtime\\.getRuntime\\(\\)\\.exec|new\\s+ProcessBuilder)\\s*\\([^)]*(?:\\+|request\\.)"
    compliance: ["OWASP-A3:2021", "CWE-78"]
    severity: "CRITICAL"

  - id: "JAVA-03-DESERIALIZATION"
    name: "Java: Insecure Deserialization (ObjectInputStream)"
    description: >
      ObjectInputStream.readObject() on untrusted data allows arbitrary code
      execution via gadget chains. Use a safe deserializer or allowlist classes.
    languages: ["java", "kotlin"]
    regex_pattern: "new\\s+ObjectInputStream\\s*\\("
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "CRITICAL"

  - id: "JAVA-04-HARDCODED-SECRET"
    name: "Java/Kotlin: Hardcoded Secret"
    description: >
      Sensitive field assigned a string literal. Use environment variables
      or a secrets manager (e.g. AWS Secrets Manager, Vault).
    languages: ["java", "kotlin"]
    regex_pattern: "(?i)(?:password|secret|token|apiKey|api_key|privateKey)\\s*=\\s*\"[^\"]{3,}\""
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "HIGH"

  - id: "JAVA-05-WEAK-HASH"
    name: "Java: Weak Hash Algorithm (MD5/SHA1)"
    description: >
      MessageDigest.getInstance(\"MD5\") or SHA-1 are cryptographically broken.
      Use SHA-256 or stronger.
    languages: ["java", "kotlin"]
    regex_pattern: "MessageDigest\\.getInstance\\s*\\(\\s*\"(?:MD5|SHA-1|SHA1)\""
    compliance: ["OWASP-A2:2021", "CWE-327"]
    severity: "HIGH"

  - id: "JAVA-06-XXE"
    name: "Java: XML External Entity (XXE)"
    description: >
      XML parsers with default settings allow XXE attacks. Disable
      external entity processing: factory.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true).
    languages: ["java", "kotlin"]
    regex_pattern: "(?:DocumentBuilderFactory|SAXParserFactory|XMLInputFactory)\\.newInstance\\s*\\("
    compliance: ["OWASP-A5:2021", "CWE-611"]
    severity: "HIGH"

  - id: "JAVA-07-PATH-TRAVERSAL"
    name: "Java: Potential Path Traversal"
    description: >
      File or FileInputStream constructed from user request parameters.
      Validate and canonicalize paths with File.getCanonicalPath().
    languages: ["java", "kotlin"]
    regex_pattern: "new\\s+(?:File|FileInputStream)\\s*\\([^)]*(?:request\\.getParameter|getPathVariable|\\+)"
    compliance: ["OWASP-A1:2021", "CWE-22"]
    severity: "HIGH"

  - id: "JAVA-08-OPEN-REDIRECT"
    name: "Java/Spring: Open Redirect"
    description: >
      response.sendRedirect() or RedirectView with user-controlled URL.
      Validate redirect targets against an allowlist.
    languages: ["java", "kotlin"]
    regex_pattern: "(?:sendRedirect|new\\s+RedirectView)\\s*\\([^)]*(?:request\\.getParameter|getParam|\\+)"
    compliance: ["OWASP-A1:2021", "CWE-601"]
    severity: "MEDIUM"

  - id: "JAVA-09-SPRING-ACTUATOR"
    name: "Spring Boot: All Actuator Endpoints Exposed"
    description: >
      management.endpoints.web.exposure.include=* exposes sensitive actuator
      endpoints (health, env, beans, heapdump). Restrict to specific safe endpoints.
    languages: ["java", "kotlin"]
    regex_pattern: "management\\.endpoints\\.web\\.exposure\\.include\\s*=\\s*\\*"
    compliance: ["OWASP-A5:2021", "CWE-200"]
    severity: "HIGH"

  - id: "JAVA-10-LOG4J-JNDI"
    name: "Java: Log4Shell / JNDI Lookup Pattern"
    description: >
      Logging user-controlled data through Log4j 2.x with JNDI lookup patterns
      (${jndi:...}) enables remote code execution (CVE-2021-44228).
      Update Log4j to 2.17.1+ and sanitize all logged user input.
    languages: ["java", "kotlin"]
    regex_pattern: "(?:log|logger)\\.(?:info|warn|error|debug|fatal)\\s*\\([^)]*(?:request\\.|userInput|params)"
    compliance: ["CVE-2021-44228", "OWASP-A6:2021", "CWE-20"]
    severity: "CRITICAL"

  # ══════════════════════════════════════════════════════════════════════════════
  # RUBY RULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "RUBY-01-SQL-INJECTION"
    name: "Ruby/Rails: Potential SQL Injection"
    description: >
      String interpolation in ActiveRecord queries allows SQL injection.
      Use parameterized queries: where("name = ?", name) or where(name: name).
    languages: ["ruby"]
    regex_pattern: "(?:where|find_by_sql|execute|select)\\s*\\([^)]*#\\{"
    compliance: ["OWASP-A3:2021", "CWE-89"]
    severity: "CRITICAL"

  - id: "RUBY-02-COMMAND-INJECTION"
    name: "Ruby: Potential Command Injection"
    description: >
      Kernel#system, backticks, or %x[] with string interpolation.
      Use IO.popen with an argument array or shellwords escaping.
    languages: ["ruby"]
    regex_pattern: "(?:`[^`]*#\\{|%x\\[[^\\]]*#\\{|system\\s*\\([^)]*#\\{)"
    compliance: ["OWASP-A3:2021", "CWE-78"]
    severity: "CRITICAL"

  - id: "RUBY-03-MASS-ASSIGNMENT"
    name: "Ruby/Rails: Mass Assignment Vulnerability"
    description: >
      Using params directly in model creation without strong parameters
      allows attackers to set arbitrary attributes.
    languages: ["ruby"]
    regex_pattern: "(?:create|update|new)\\s*\\(\\s*params(?!.*permit)"
    compliance: ["OWASP-A1:2021", "CWE-915"]
    severity: "HIGH"

  - id: "RUBY-04-HARDCODED-SECRET"
    name: "Ruby: Hardcoded Secret"
    description: >
      Sensitive variable assigned a string literal.
      Use Rails credentials (rails credentials:edit) or ENV variables.
    languages: ["ruby"]
    regex_pattern: "(?i)(?:password|secret|token|api_key|secret_key_base)\\s*=\\s*['\"][^'\"]{3,}['\"]"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "HIGH"

  - id: "RUBY-05-YAML-LOAD"
    name: "Ruby: Insecure YAML.load"
    description: >
      YAML.load() can execute arbitrary Ruby code via Psych deserialization gadgets.
      Use YAML.safe_load() or YAML.load(input, permitted_classes: []) instead.
    languages: ["ruby"]
    regex_pattern: "YAML\\.load\\s*\\("
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "CRITICAL"

  # ══════════════════════════════════════════════════════════════════════════════
  # PYTHON FRAMEWORK-SPECIFIC RULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "PY-SQLALCHEMY-RAW"
    name: "Python/SQLAlchemy: Raw SQL with String Interpolation"
    description: >
      text() or engine.execute() with f-strings or % formatting allows SQL injection.
      Use SQLAlchemy's ORM or parameterized text(\"SELECT :val\").bindparams(val=x).
    languages: ["python"]
    regex_pattern: "(?:db\\.session\\.execute|engine\\.execute|text)\\s*\\(\\s*(?:f['\"]|['\"][^'\"]*%)"
    compliance: ["OWASP-A3:2021", "CWE-89"]
    severity: "CRITICAL"

  - id: "PY-FASTAPI-OPEN-REDIRECT"
    name: "Python/FastAPI: Open Redirect"
    description: >
      RedirectResponse with user-controlled URL. Validate redirect targets
      against an allowlist before redirecting.
    languages: ["python"]
    regex_pattern: "RedirectResponse\\s*\\([^)]*(?:request\\.|query_params|body)"
    compliance: ["OWASP-A1:2021", "CWE-601"]
    severity: "MEDIUM"

  - id: "PY-REQUESTS-NO-TIMEOUT"
    name: "Python: HTTP Request Without Timeout"
    description: >
      requests.get/post without a timeout parameter can hang indefinitely,
      causing resource exhaustion. Always specify timeout=N.
    languages: ["python"]
    regex_pattern: "requests\\.(?:get|post|put|patch|delete|request)\\s*\\([^)]*\\)(?![^#]*timeout)"
    compliance: ["CWE-400", "OWASP-A6:2021"]
    severity: "LOW"

  - id: "PY-FLASK-COOKIE-SECURE"
    name: "Python/Flask: Insecure Cookie Configuration"
    description: >
      Setting SESSION_COOKIE_SECURE=False or SESSION_COOKIE_HTTPONLY=False
      exposes session cookies to network eavesdropping or XSS.
    languages: ["python"]
    regex_pattern: "(?i)SESSION_COOKIE_(?:SECURE|HTTPONLY)\\s*=\\s*False"
    compliance: ["OWASP-A2:2021", "CWE-614"]
    severity: "HIGH"

  - id: "PY-HARDCODED-STRIPE-KEY"
    name: "Python: Hardcoded Stripe Secret Key"
    description: >
      Stripe secret API keys (sk_live_...) detected in source code.
      Revoke and rotate immediately; use environment variables.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "sk_live_[A-Za-z0-9]{24,}"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  - id: "PY-HARDCODED-TWILIO"
    name: "Hardcoded Twilio Auth Token"
    description: >
      Twilio account SID / auth token detected in source.
      Use environment variables.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?:AC[a-z0-9]{32}|SK[a-z0-9]{32})"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  - id: "PY-HARDCODED-SENDGRID"
    name: "Hardcoded SendGrid API Key"
    description: >
      SendGrid API keys (SG.xxx) detected in source.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "SG\\.[A-Za-z0-9_-]{22}\\.[A-Za-z0-9_-]{43}"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  - id: "PY-HARDCODED-GCP-KEY"
    name: "Hardcoded GCP Service Account Key"
    description: >
      Google Cloud Platform service account private key or API key detected.
      Use Application Default Credentials or Workload Identity instead.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "\"private_key\":\\s*\"-----BEGIN RSA PRIVATE KEY-----"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  - id: "PY-UNSAFE-TEMP-FILE"
    name: "Python: Insecure Temporary File"
    description: >
      tempfile.mktemp() is insecure due to TOCTOU race conditions.
      Use tempfile.NamedTemporaryFile() or tempfile.mkstemp() instead.
    languages: ["python"]
    regex_pattern: "tempfile\\.mktemp\\s*\\("
    compliance: ["CWE-377", "OWASP-A1:2021"]
    severity: "MEDIUM"

  - id: "PY-ASSERT-USED"
    name: "Python: assert Used for Security Check"
    description: >
      Python's assert statements are disabled when running with -O (optimize).
      Never use assert for authentication, authorization, or input validation.
    languages: ["python"]
    regex_pattern: "(?i)assert\\s+(?:user|auth|is_admin|permission|token|logged_in)"
    compliance: ["CWE-617", "OWASP-A1:2021"]
    severity: "HIGH"

  # ══════════════════════════════════════════════════════════════════════════════
  # JAVASCRIPT / TYPESCRIPT FRAMEWORK-SPECIFIC
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "JS-01-NOSQL-MONGOOSE"
    name: "Node.js/Mongoose: NoSQL Injection"
    description: >
      Passing req.body or req.query directly to Mongoose find() or findOne()
      allows query operator injection ({$gt:'', $where:'...'}).
      Sanitize with express-mongo-sanitize or validate schema strictly.
    languages: ["javascript", "typescript"]
    regex_pattern: "(?:find|findOne|findById|updateOne|deleteOne)\\s*\\(\\s*(?:req\\.body|req\\.query|req\\.params)"
    compliance: ["OWASP-A3:2021", "CWE-943"]
    severity: "CRITICAL"

  - id: "JS-02-HARDCODED-JWT-SECRET"
    name: "Node.js: Hardcoded JWT Secret"
    description: >
      jwt.sign() called with a hardcoded string secret.
      Use a long random secret from environment variables.
    languages: ["javascript", "typescript"]
    regex_pattern: "jwt\\.sign\\s*\\([^)]+,\\s*['\"][^'\"]{3,}['\"]"
    compliance: ["OWASP-A2:2021", "CWE-798"]
    severity: "HIGH"

  - id: "JS-03-SERIALIZE-JS"
    name: "Node.js: serialize-javascript / vm.runInNewContext"
    description: >
      Deserializing user-controlled JavaScript with serialize-js or vm.runInNewContext
      can lead to arbitrary code execution.
    languages: ["javascript", "typescript"]
    regex_pattern: "(?:serialize|vm\\.runInNewContext|vm\\.runInContext)\\s*\\([^)]*(?:req\\.|body|params|query)"
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "CRITICAL"

  - id: "JS-04-HELMET-MISSING"
    name: "Express: Helmet Security Middleware Not Used"
    description: >
      Express app created without helmet() middleware leaves HTTP security headers
      (X-XSS-Protection, HSTS, CSP, etc.) unset.
    languages: ["javascript", "typescript"]
    regex_pattern: "express\\s*\\(\\s*\\)(?![\\s\\S]{0,200}helmet)"
    compliance: ["OWASP-A5:2021", "CWE-16"]
    severity: "MEDIUM"

  - id: "JS-05-DANGEROUS-DANGEROUSLY-SET-HTML"
    name: "React: dangerouslySetInnerHTML with Non-Literal"
    description: >
      dangerouslySetInnerHTML with a variable (not a hardcoded string literal)
      risks XSS if the value is user-controlled. Sanitize with DOMPurify first.
    languages: ["javascript", "typescript"]
    regex_pattern: "dangerouslySetInnerHTML\\s*=\\s*\\{\\s*\\{\\s*__html\\s*:"
    compliance: ["OWASP-A3:2021", "CWE-79"]
    severity: "MEDIUM"

  - id: "JS-06-CORS-ALL-ORIGINS-EXPRESS"
    name: "Express: CORS Allowing All Origins"
    description: >
      cors({origin: '*'}) or cors() without origin restriction allows any domain
      to make credentialed cross-origin requests to your API.
    languages: ["javascript", "typescript"]
    regex_pattern: "cors\\s*\\(\\s*\\{[^}]*origin\\s*:\\s*['\"]\\*['\"]"
    compliance: ["OWASP-A5:2021", "CWE-942"]
    severity: "MEDIUM"

  # ══════════════════════════════════════════════════════════════════════════════
  # CLOUD / INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "CLOUD-01-S3-PUBLIC-ACL"
    name: "AWS S3: Public ACL"
    description: >
      Setting S3 bucket or object ACL to 'public-read' or 'public-read-write'
      exposes data to the public internet.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "(?:ACL|acl)\\s*=\\s*['\"]public-read(?:-write)?['\"]"
    compliance: ["OWASP-A5:2021", "CWE-284", "AWS Security Best Practices"]
    severity: "HIGH"

  - id: "CLOUD-02-AZURE-CONNECTION-STRING"
    name: "Azure: Hardcoded Connection String"
    description: >
      Azure Storage or Service Bus connection string with AccountKey embedded.
      Use Managed Identity or Azure Key Vault instead.
    languages: ["python", "javascript", "typescript", "java", "kotlin"]
    regex_pattern: "AccountKey=[A-Za-z0-9+/]{43,}={0,2}"
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "CRITICAL"

  - id: "CLOUD-03-HARDCODED-GCP-PROJECT"
    name: "GCP: Hardcoded Project ID / Credentials"
    description: >
      Google Cloud credentials or project IDs embedded in code. Use
      Application Default Credentials (ADC) and environment config.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "\"type\":\\s*\"service_account\""
    compliance: ["OWASP-A7:2021", "CWE-798"]
    severity: "HIGH"

  - id: "CLOUD-04-DOCKER-ROOT"
    name: "Dockerfile: Running as Root"
    description: >
      Container running as root (no USER directive after FROM).
      Add 'USER nonroot' or a specific low-privilege user to the Dockerfile.
    languages: ["python", "javascript", "typescript"]
    regex_pattern: "USER\\s+root"
    compliance: ["CWE-250", "Docker CIS Benchmark 4.1"]
    severity: "MEDIUM"

  # ══════════════════════════════════════════════════════════════════════════════
  # PHP RULES
  # ══════════════════════════════════════════════════════════════════════════════

  - id: "PHP-01-SQL-INJECTION"
    name: "PHP: Potential SQL Injection"
    description: >
      String concatenation used to build SQL queries in PHP. Use PDO with
      prepared statements and parameterized queries instead.
    languages: ["php"]
    regex_pattern: "(?i)(?:mysql_query|mysqli_query|\\$(?:pdo|db|conn|connection|mysqli)\\s*->\\s*query)\\s*\\([^)]*(?:\\$_(?:GET|POST|REQUEST|COOKIE|SERVER)|\\$[a-z_]+\\s*\\.)"
    compliance: ["OWASP-A3:2021", "CWE-89", "PCI-DSS 6.3.1"]
    severity: "CRITICAL"

  - id: "PHP-02-HARDCODED-CREDENTIALS"
    name: "PHP: Hardcoded Database Credentials"
    description: >
      Database username or password hardcoded directly in PHP source code.
      Use environment variables or a secrets manager instead.
    languages: ["php"]
    regex_pattern: "(?i)\\$(?:pass|password|passwd|db_pass|db_password|dbpass)\\s*=\\s*['\"][^'\"]*['\"]"
    compliance: ["OWASP-A7:2021", "CWE-798", "ISO-27001:A.9"]
    severity: "HIGH"

  - id: "PHP-03-HARDCODED-DB-USER-ROOT"
    name: "PHP: Database Connection as Root User"
    description: >
      Connecting to the database as 'root' with no or empty password.
      Create a dedicated low-privilege database user for the application.
    languages: ["php"]
    regex_pattern: "(?i)(?:new\\s+PDO|mysqli_connect|mysql_connect)\\s*\\([^)]*['\"]root['\"]"
    compliance: ["OWASP-A7:2021", "CWE-798", "PCI-DSS 8.2"]
    severity: "CRITICAL"

  - id: "PHP-04-ERROR-INFORMATION-DISCLOSURE"
    name: "PHP: Error Message Information Disclosure"
    description: >
      Exception or error details exposed directly to the user via die() or echo.
      Log errors server-side and show a generic message to users.
    languages: ["php"]
    regex_pattern: "(?i)die\\s*\\(\\s*['\"].*(?:Error|error|Exception|exception|conexi|connect|mysql|database)"
    compliance: ["OWASP-A5:2021", "CWE-209"]
    severity: "HIGH"

  - id: "PHP-05-XSS-ECHO-USER-INPUT"
    name: "PHP: Potential XSS — Unescaped Output"
    description: >
      User-supplied data (from $_GET, $_POST, $_REQUEST, $_COOKIE) echoed
      without htmlspecialchars() or htmlentities() allows Cross-Site Scripting.
    languages: ["php"]
    regex_pattern: "(?i)(?:echo|print)\\s+(?!htmlspecialchars|htmlentities).*\\$_(?:GET|POST|REQUEST|COOKIE)\\["
    compliance: ["OWASP-A3:2021", "CWE-79"]
    severity: "HIGH"

  - id: "PHP-06-COMMAND-INJECTION"
    name: "PHP: Potential Command Injection"
    description: >
      Shell execution functions (system, exec, passthru, shell_exec, backticks)
      called with user-controlled input allow arbitrary command execution.
    languages: ["php"]
    regex_pattern: "(?i)(?:system|exec|passthru|shell_exec|popen|proc_open)\\s*\\([^)]*\\$_(?:GET|POST|REQUEST|COOKIE|SERVER)"
    compliance: ["OWASP-A3:2021", "CWE-78"]
    severity: "CRITICAL"

  - id: "PHP-07-FILE-INCLUSION"
    name: "PHP: Remote/Local File Inclusion"
    description: >
      include() or require() with user-controlled input allows attackers to
      include arbitrary local or remote files (LFI/RFI).
    languages: ["php"]
    regex_pattern: "(?i)(?:include|require|include_once|require_once)\\s*(?:\\()?\\s*\\$_(?:GET|POST|REQUEST|COOKIE)"
    compliance: ["OWASP-A1:2021", "CWE-98"]
    severity: "CRITICAL"

  - id: "PHP-08-WEAK-HASHING"
    name: "PHP: Weak Password Hashing (MD5/SHA1)"
    description: >
      MD5 and SHA1 are not suitable for password hashing. Use password_hash()
      with PASSWORD_DEFAULT (bcrypt) or PASSWORD_ARGON2ID.
    languages: ["php"]
    regex_pattern: "(?i)(?:md5|sha1)\\s*\\("
    compliance: ["OWASP-A2:2021", "CWE-327", "PCI-DSS 6.3.3"]
    severity: "HIGH"

  - id: "PHP-09-CSRF-NO-TOKEN"
    name: "PHP: Missing CSRF Token in Form"
    description: >
      HTML forms with POST method do not include a CSRF token field.
      Implement synchronizer token pattern or SameSite cookie attribute.
    languages: ["php"]
    regex_pattern: "(?i)<form[^>]*method\\s*=\\s*['\"]post['\"][^>]*>(?:(?!</form>).)*?<\\/form>"
    compliance: ["OWASP-A1:2021", "CWE-352"]
    severity: "HIGH"

  - id: "PHP-10-SESSION-NO-HTTPONLY"
    name: "PHP: Session Cookie Without HttpOnly/Secure Flags"
    description: >
      session_start() without configuring session.cookie_httponly and
      session.cookie_secure exposes the session cookie to XSS and network attacks.
    languages: ["php"]
    regex_pattern: "(?i)session_start\\s*\\(\\s*\\)"
    compliance: ["OWASP-A2:2021", "CWE-614", "PCI-DSS 6.2.4"]
    severity: "MEDIUM"

  - id: "PHP-11-WEAK-PASSWORD-POLICY"
    name: "PHP: Weak Password Minimum Length Policy"
    description: >
      Password minimum length of 4 characters is insufficient. NIST SP 800-63B
      recommends a minimum of 8 characters for user-generated passwords.
    languages: ["php"]
    regex_pattern: "(?i)strlen\\s*\\(\\s*\\$password\\s*\\)\\s*(?:>=|>)\\s*[1-4](?![0-9])"
    compliance: ["OWASP-A7:2021", "CWE-521", "NIST SP 800-63B"]
    severity: "MEDIUM"

  - id: "PHP-12-MISSING-SECURITY-HEADERS"
    name: "PHP: Missing HTTP Security Headers"
    description: >
      No X-Frame-Options, Content-Security-Policy or Strict-Transport-Security
      headers set via header(). Add security headers to all responses.
    languages: ["php"]
    regex_pattern: "(?i)header\\s*\\(\\s*['\"](?!(?:X-Frame-Options|Content-Security-Policy|Strict-Transport-Security|X-Content-Type-Options|X-XSS-Protection))"
    compliance: ["OWASP-A5:2021", "CWE-16"]
    severity: "LOW"

  - id: "PHP-13-OPEN-REDIRECT"
    name: "PHP: Potential Open Redirect"
    description: >
      header('Location: ...') using user-supplied input without validation
      enables open redirect attacks for phishing.
    languages: ["php"]
    regex_pattern: "(?i)header\\s*\\(\\s*['\"]Location:\\s*['\"]\\s*\\.\\s*\\$_(?:GET|POST|REQUEST|COOKIE)"
    compliance: ["OWASP-A1:2021", "CWE-601"]
    severity: "MEDIUM"

  - id: "PHP-14-DESERIALIZATION"
    name: "PHP: Insecure Deserialization (unserialize)"
    description: >
      unserialize() on user-controlled data allows arbitrary PHP object injection
      and potential remote code execution via gadget chains. Use JSON instead.
    languages: ["php"]
    regex_pattern: "(?i)unserialize\\s*\\([^)]*\\$_(?:GET|POST|REQUEST|COOKIE)"
    compliance: ["OWASP-A8:2021", "CWE-502"]
    severity: "CRITICAL"

  - id: "PHP-15-PATH-TRAVERSAL"
    name: "PHP: Potential Path Traversal"
    description: >
      File operations (fopen, file_get_contents, readfile) with user-controlled
      paths allow reading arbitrary files. Validate and normalize paths.
    languages: ["php"]
    regex_pattern: "(?i)(?:fopen|file_get_contents|readfile|file_put_contents)\\s*\\([^)]*\\$_(?:GET|POST|REQUEST|COOKIE)"
    compliance: ["OWASP-A1:2021", "CWE-22"]
    severity: "HIGH"

  - id: "PHP-16-EMPTY-DB-PASSWORD"
    name: "PHP: Empty Database Password"
    description: >
      Database connection configured with an empty password. This allows
      unauthenticated access to the database if exposed on the network.
    languages: ["php"]
    regex_pattern: "(?i)\\$pass(?:word)?\\s*=\\s*['\"]['\"]"
    compliance: ["OWASP-A7:2021", "CWE-521", "PCI-DSS 8.2.3"]
    severity: "CRITICAL"

  - id: "PHP-17-EVAL-USAGE"
    name: "PHP: Use of eval()"
    description: >
      eval() executes arbitrary PHP code and is a critical injection vector.
      Refactor to avoid dynamic code execution entirely.
    languages: ["php"]
    regex_pattern: "(?<![a-zA-Z_])eval\\s*\\("
    compliance: ["OWASP-A3:2021", "CWE-95"]
    severity: "HIGH"

  - id: "PHP-18-SENSITIVE-DATA-IN-DB-URL"
    name: "PHP: Credentials Exposed in DSN / Connection String"
    description: >
      Database connection DSN string with hardcoded hostname, username or
      password. Use environment variables for all connection parameters.
    languages: ["php"]
    regex_pattern: "(?i)\\$dsn\\s*=\\s*['\"][a-z]+:host="
    compliance: ["OWASP-A7:2021", "CWE-312", "ISO-27001:A.9"]
    severity: "MEDIUM"

  # ═══════════════════════════════════════════════════════════════════════════
  # IaC — Dockerfile
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "IAC-01-DOCKER-ROOT"
    name: "Dockerfile: Container Running as Root"
    description: >
      No USER instruction found — container will run as root by default.
      Add 'USER nonroot' or create a dedicated user to reduce blast radius.
    languages: ["dockerfile"]
    regex_pattern: "^FROM\\s+"
    compliance: ["CWE-250", "OWASP-A5:2021", "ISO-27001:A.9"]
    severity: "MEDIUM"

  - id: "IAC-02-DOCKER-LATEST"
    name: "Dockerfile: Unpinned 'latest' Tag"
    description: >
      Using ':latest' or no tag makes builds non-reproducible and may silently
      pull a vulnerable image version. Pin to a specific digest or version tag.
    languages: ["dockerfile"]
    regex_pattern: "FROM\\s+[^\\s]+:latest|FROM\\s+[a-zA-Z0-9/_.-]+\\s"
    compliance: ["CWE-829", "OWASP-A6:2021"]
    severity: "LOW"

  - id: "IAC-03-DOCKER-SECRET-ARG"
    name: "Dockerfile: Secret Passed via ARG"
    description: >
      Secrets passed via ARG are visible in the image build cache and
      'docker history'. Use Docker BuildKit secrets (--secret id=...) instead.
    languages: ["dockerfile"]
    regex_pattern: "(?i)ARG\\s+(password|secret|token|key|api_key|passwd)"
    compliance: ["CWE-540", "OWASP-A7:2021"]
    severity: "HIGH"

  - id: "IAC-04-DOCKER-CURL-PIPE-SH"
    name: "Dockerfile: Curl-Pipe-Bash Pattern"
    description: >
      Executing remote scripts via 'curl | sh' or 'wget | bash' allows supply-chain
      attacks if the remote URL is compromised. Verify checksums instead.
    languages: ["dockerfile"]
    regex_pattern: "(?i)(?:curl|wget).+\\|\\s*(?:bash|sh|python|perl)"
    compliance: ["CWE-829", "OWASP-A8:2021"]
    severity: "HIGH"

  - id: "IAC-05-DOCKER-PRIVILEGED"
    name: "Dockerfile: Privileged Port (<1024)"
    description: >
      Exposing a port below 1024 requires root privileges inside the container.
      Prefer a high port and use reverse-proxy mappings on the host.
    languages: ["dockerfile"]
    regex_pattern: "EXPOSE\\s+([1-9]|[1-9][0-9]{1,2}|10[0-1][0-9]|102[0-3])(?:\\s|$)"
    compliance: ["CWE-250", "OWASP-A5:2021"]
    severity: "LOW"

  # ═══════════════════════════════════════════════════════════════════════════
  # IaC — docker-compose
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "IAC-06-COMPOSE-PRIVILEGED"
    name: "docker-compose: Privileged Mode Enabled"
    description: >
      'privileged: true' grants the container almost full host capabilities.
      Remove it and use specific 'cap_add' entries instead.
    languages: ["yaml_compose"]
    regex_pattern: "(?i)privileged\\s*:\\s*true"
    compliance: ["CWE-250", "OWASP-A5:2021", "ISO-27001:A.9"]
    severity: "CRITICAL"

  - id: "IAC-07-COMPOSE-HOST-NETWORK"
    name: "docker-compose: Host Network Mode"
    description: >
      'network_mode: host' bypasses Docker network isolation, exposing all host
      ports to the container. Use a named bridge network instead.
    languages: ["yaml_compose"]
    regex_pattern: "(?i)network_mode\\s*:\\s*['\"]?host['\"]?"
    compliance: ["CWE-668", "OWASP-A5:2021"]
    severity: "HIGH"

  - id: "IAC-08-COMPOSE-SECRET-ENV"
    name: "docker-compose: Hardcoded Secret in environment"
    description: >
      Hardcoded passwords or tokens in 'environment' blocks are stored in plain
      text in the Compose file. Use Docker Secrets or env_file instead.
    languages: ["yaml_compose"]
    regex_pattern: "(?i)(PASSWORD|SECRET|TOKEN|API_KEY|PASSWD)\\s*[=:]\\s*[^\\$\\{][^\\s]+"
    compliance: ["CWE-312", "OWASP-A7:2021"]
    severity: "HIGH"

  - id: "IAC-09-COMPOSE-BIND-ALL"
    name: "docker-compose: Port Bound to 0.0.0.0"
    description: >
      Binding a port to '0.0.0.0' exposes it on all interfaces including public
      ones. Bind to '127.0.0.1' unless intentionally public.
    languages: ["yaml_compose"]
    regex_pattern: "(?i)['\"]?0\\.0\\.0\\.0:"
    compliance: ["CWE-668", "OWASP-A5:2021"]
    severity: "MEDIUM"

  # ═══════════════════════════════════════════════════════════════════════════
  # IaC — Terraform / HCL
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "IAC-10-TF-PUBLIC-S3"
    name: "Terraform: S3 Bucket Public ACL"
    description: >
      Setting 'acl = "public-read"' or '"public-read-write"' on an S3 bucket
      exposes its contents to the internet. Use bucket policies with least privilege.
    languages: ["terraform"]
    regex_pattern: "(?i)acl\\s*=\\s*['\"]public-read"
    compliance: ["CWE-732", "OWASP-A5:2021", "ISO-27001:A.13"]
    severity: "CRITICAL"

  - id: "IAC-11-TF-HARDCODED-SECRET"
    name: "Terraform: Hardcoded Secret or Password"
    description: >
      Sensitive values hardcoded in .tf files are committed to version control
      in plaintext. Use Terraform variables with sensitive=true and a secrets manager.
    languages: ["terraform"]
    regex_pattern: "(?i)(password|secret|token|api_key)\\s*=\\s*[\"'][^\"']{4,}[\"']"
    compliance: ["CWE-798", "OWASP-A7:2021"]
    severity: "HIGH"

  - id: "IAC-12-TF-OPEN-SECURITY-GROUP"
    name: "Terraform: Security Group Open to 0.0.0.0/0"
    description: >
      An ingress rule allowing traffic from 0.0.0.0/0 exposes the resource to
      the entire internet. Restrict to known IP ranges.
    languages: ["terraform"]
    regex_pattern: "(?i)cidr_blocks\\s*=\\s*\\[\\s*[\"']0\\.0\\.0\\.0/0[\"']"
    compliance: ["CWE-668", "OWASP-A5:2021", "ISO-27001:A.13"]
    severity: "HIGH"

  - id: "IAC-13-TF-UNENCRYPTED-STORAGE"
    name: "Terraform: Storage Resource Without Encryption"
    description: >
      RDS, S3, or EBS resource without 'encrypted = true' or 'storage_encrypted = true'.
      Enable server-side encryption at rest.
    languages: ["terraform"]
    regex_pattern: "(?i)(?:storage_encrypted|encrypted)\\s*=\\s*false"
    compliance: ["CWE-311", "PCI-DSS 3.4", "ISO-27001:A.10"]
    severity: "HIGH"

  # ═══════════════════════════════════════════════════════════════════════════
  # IaC — Kubernetes manifests
  # ═══════════════════════════════════════════════════════════════════════════

  - id: "IAC-14-K8S-PRIVILEGED-CONTAINER"
    name: "Kubernetes: Privileged Container"
    description: >
      'privileged: true' in securityContext gives the container near-root access
      to the host kernel. Remove it and use specific capabilities.
    languages: ["yaml_k8s"]
    regex_pattern: "(?i)privileged\\s*:\\s*true"
    compliance: ["CWE-250", "OWASP-A5:2021", "ISO-27001:A.9"]
    severity: "CRITICAL"

  - id: "IAC-15-K8S-NO-RESOURCE-LIMITS"
    name: "Kubernetes: Container Without Resource Limits"
    description: >
      Containers without CPU/memory limits can consume all host resources, causing
      denial of service. Always define 'resources.limits'.
    languages: ["yaml_k8s"]
    regex_pattern: "(?i)containers:\\s*\\n(?\!.*resources)"
    compliance: ["CWE-400", "OWASP-A5:2021"]
    severity: "MEDIUM"

  - id: "IAC-16-K8S-HOST-PID"
    name: "Kubernetes: hostPID or hostNetwork Enabled"
    description: >
      'hostPID: true' or 'hostNetwork: true' breaks pod isolation and gives the
      container direct access to host process/network namespaces.
    languages: ["yaml_k8s"]
    regex_pattern: "(?i)(?:hostPID|hostNetwork|hostIPC)\\s*:\\s*true"
    compliance: ["CWE-668", "OWASP-A5:2021"]
    severity: "HIGH"

  - id: "IAC-17-K8S-SECRET-ENV"
    name: "Kubernetes: Secret Value Hardcoded in env"
    description: >
      Hardcoded values in container env blocks bypass Kubernetes Secrets management.
      Use secretKeyRef to pull values from a Secret object.
    languages: ["yaml_k8s"]
    regex_pattern: "(?i)(?:value|value_from)\\s*:\\s*['\"]?(?:password|secret|token|key).*['\"]?"
    compliance: ["CWE-312", "OWASP-A7:2021"]
    severity: "HIGH"
